title: ""
body:
  - type: markdown
    attributes:
      value: |
        Have a question about BoxCast or need help troubleshooting? 
        Please provide the details below, and the community will jump in to help!
  - type: textarea
    id: question
    attributes:
      label: What is your question?
      description: Be as specific as possible.
    validations:
      required: true
  - type: textarea
    id: details
    attributes:
      label: Additional Context
      description: Provide any screenshots, device specs, or other relevant information.
    validations:
      required: false
