name: 📺 Stream Issue
description: Report a broken or problematic live stream
labels: ["stream", "urgent"]
body:
  - type: markdown
    attributes:
      value: |
        ⚡ Stream issues are treated as **urgent** since they affect live viewing!

  - type: dropdown
    id: channel
    attributes:
      label: Which channel is affected?
      options:
        - Sky Sports Main Event UK
        - OTHER
        - All channels
    validations:
      required: true

  - type: dropdown
    id: problem-type
    attributes:
      label: What's the problem?
      options:
        - Stream won't load at all
        - No audio / muted
        - Buffering / freezing
        - Ads / pop-ups blocking the video
        - Wrong content playing
        - Stream is behind (not live)
        - Other
    validations:
      required: true

  - type: textarea
    id: details
    attributes:
      label: Additional details
      description: "Anything else that might help us fix this?"
    validations:
      required: false
